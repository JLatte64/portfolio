name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        # Bypasses historical peer-dependency locks during silent scripts
        run: npm ci --legacy-peer-deps

      - name: Build
        # Triggers your "tsc -b && vite-react-ssg build" script phase
        run: npm run build

      - name: Create Client-Side Routing Fallback (404.html)
        # Duplicates your index.html file so refreshes on deep routes work flawlessly
        run: cp dist/index.html dist/404.html

      # - name: Create GoDaddy Domain Connector (CNAME)
      #   # Writes your domain directly into the package root so GitHub links it to GoDaddy
      #   # SWAP "yourdomain.com" with your actual custom domain string!
      #   run: echo "yourdomain.com" > dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
